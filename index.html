<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRCraft - QR Code Generator</title>
  <meta name="description" content="Generate customizable QR codes instantly. Free tool with custom colors, logo embedding, batch generation, and PNG/SVG download.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='10' width='30' height='30' rx='4' fill='%237c3aed'/><rect x='60' y='10' width='30' height='30' rx='4' fill='%237c3aed'/><rect x='10' y='60' width='30' height='30' rx='4' fill='%237c3aed'/><rect x='65' y='65' width='20' height='20' rx='3' fill='%237c3aed' opacity='0.6'/></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-raised: #1a1a2e;
      --border: #2a2a3e;
      --primary: #7c3aed;
      --primary-hover: #9333ea;
      --primary-glow: rgba(124, 58, 237, 0.15);
      --text: #e0e0e8;
      --text-muted: #888898;
      --danger: #ff6b6b;
      --success: #00d4aa;
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    [data-theme="light"] {
      --bg: #f5f5f8;
      --surface: #ffffff;
      --surface-raised: #f0f0f5;
      --border: #d8d8e0;
      --text: #1a1a2e;
      --text-muted: #6b6b80;
      --primary: #6d28d9;
      --primary-hover: #5b21b6;
      --primary-glow: rgba(109, 40, 217, 0.15);
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    main {
      width: 100%;
      max-width: 720px;
      padding: 2rem 1.5rem;
      flex: 1;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--primary), #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 1.05rem;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    /* Section labels */
    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
      display: block;
    }

    /* Input */
    .input-area {
      margin-bottom: 1.25rem;
    }

    .input-area textarea {
      width: 100%;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.95rem;
      padding: 0.75rem;
      outline: none;
      resize: vertical;
      min-height: 80px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-area textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .input-area textarea::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .char-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: right;
      margin-top: 0.3rem;
    }

    .char-count.warn {
      color: var(--danger);
    }

    /* Options grid */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .option-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .option-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .option-group select,
    .option-group input[type="number"] {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.9rem;
      padding: 0.55rem 0.75rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .option-group select:focus,
    .option-group input[type="number"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .option-group select option {
      background: var(--surface);
      color: var(--text);
    }

    /* Color inputs */
    .color-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .color-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex: 1;
    }

    .color-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .color-input-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.35rem 0.6rem;
      transition: border-color 0.2s;
    }

    .color-input-wrap:focus-within {
      border-color: var(--primary);
    }

    .color-input-wrap input[type="color"] {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    .color-input-wrap input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .color-input-wrap input[type="color"]::-webkit-color-swatch {
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .color-input-wrap input[type="text"] {
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      outline: none;
      width: 7ch;
    }

    /* Logo upload */
    .logo-group {
      margin-bottom: 1.25rem;
    }

    .logo-upload {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-upload-btn {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .logo-upload-btn:hover {
      border-color: var(--primary);
      color: var(--text);
    }

    .logo-preview {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      object-fit: contain;
      display: none;
    }

    .logo-preview.visible {
      display: block;
    }

    .logo-remove {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.2rem 0.4rem;
      display: none;
    }

    .logo-remove.visible {
      display: inline;
    }

    /* Generate button */
    .btn-generate {
      width: 100%;
      padding: 0.8rem;
      background: var(--primary);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-generate:hover {
      background: var(--primary-hover);
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .btn-generate:active {
      transform: scale(0.98);
    }

    .btn-generate kbd {
      font-family: var(--mono);
      font-size: 0.7rem;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      opacity: 0.7;
    }

    /* Output */
    .output-card {
      display: none;
    }

    .output-card.visible {
      display: block;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .output-header h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .output-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-action {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.35rem 0.7rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .btn-action:hover {
      border-color: var(--primary);
      color: var(--text);
    }

    .btn-action kbd {
      font-family: var(--mono);
      font-size: 0.65rem;
      opacity: 0.6;
    }

    /* QR display */
    .qr-display {
      display: flex;
      justify-content: center;
      padding: 1.5rem;
    }

    .qr-display canvas {
      border-radius: 8px;
      max-width: 100%;
      height: auto;
    }

    /* Batch output */
    .batch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      padding: 0.5rem 0;
    }

    .batch-item {
      background: var(--surface-raised);
      border-radius: 8px;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      animation: itemFadeIn 0.3s ease-out both;
    }

    .batch-item canvas {
      border-radius: 4px;
      max-width: 100%;
    }

    .batch-item-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--mono);
      text-align: center;
      word-break: break-all;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .batch-item .btn-copy {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.2rem;
      border-radius: 4px;
      transition: color 0.2s;
      display: flex;
    }

    .batch-item .btn-copy:hover {
      color: var(--primary);
    }

    @keyframes itemFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Batch input */
    .batch-section {
      display: none;
    }

    .batch-section.visible {
      display: block;
    }

    .batch-textarea {
      width: 100%;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0.75rem;
      outline: none;
      resize: vertical;
      min-height: 100px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .batch-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .batch-textarea::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .batch-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    /* Mode tabs */
    .mode-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .mode-tab {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.45rem 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .mode-tab:hover {
      border-color: var(--primary);
      color: var(--text);
    }

    .mode-tab.active {
      border-color: var(--primary);
      background: var(--primary-glow);
      color: var(--primary);
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: center;
      pointer-events: none;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--primary);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 1.7s forwards;
      pointer-events: auto;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-10px); }
    }

    /* Footer */
    footer {
      width: 100%;
      text-align: center;
      padding: 1.5rem;
      color: var(--text-muted);
      font-size: 0.78rem;
      border-top: 1px solid var(--border);
    }

    footer a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover {
      color: var(--primary-hover);
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.45rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
      z-index: 100;
    }

    .theme-toggle:hover {
      border-color: var(--primary);
      color: var(--text);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
    }

    /* Responsive */
    @media (max-width: 520px) {
      main {
        padding: 1.5rem 1rem;
      }

      header h1 {
        font-size: 2.2rem;
      }

      .options-grid {
        grid-template-columns: 1fr;
      }

      .color-row {
        flex-direction: column;
      }

      .btn-generate kbd,
      .btn-action kbd {
        display: none;
      }

      .batch-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .batch-item { animation: none; }
      .toast { animation: none; }
      * { transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" title="Toggle theme (T)">
    <svg id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <main>
    <header>
      <h1>QRCraft</h1>
      <p>Generate customizable QR codes</p>
    </header>

    <section class="card">
      <!-- Mode tabs -->
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="single">Single</button>
        <button class="mode-tab" data-mode="batch">Batch</button>
      </div>

      <!-- Single input -->
      <div class="input-area" id="single-input">
        <label class="section-label" for="qr-text">Content</label>
        <textarea id="qr-text" placeholder="Enter text, URL, email, phone number, or Wi-Fi config..." rows="3"></textarea>
        <div class="char-count" id="char-count">0 / 2,953</div>
      </div>

      <!-- Batch input -->
      <div class="batch-section" id="batch-input">
        <label class="section-label" for="batch-text">Batch Content (one per line)</label>
        <textarea class="batch-textarea" id="batch-text" placeholder="https://example.com&#10;https://another-site.org&#10;Hello World&#10;..."></textarea>
        <div class="batch-hint">One entry per line. Max 50 codes at once.</div>
      </div>

      <!-- Options -->
      <div class="options-grid">
        <div class="option-group">
          <label for="error-correction">Error Correction</label>
          <select id="error-correction">
            <option value="L">Low (7%)</option>
            <option value="M" selected>Medium (15%)</option>
            <option value="Q">Quartile (25%)</option>
            <option value="H">High (30%)</option>
          </select>
        </div>
        <div class="option-group">
          <label for="qr-size">Size (px)</label>
          <input type="number" id="qr-size" min="100" max="2000" value="400" step="50">
        </div>
      </div>

      <!-- Colors -->
      <div class="color-row">
        <div class="color-group">
          <label>Foreground</label>
          <div class="color-input-wrap">
            <input type="color" id="fg-color" value="#000000">
            <input type="text" id="fg-hex" value="#000000" maxlength="7">
          </div>
        </div>
        <div class="color-group">
          <label>Background</label>
          <div class="color-input-wrap">
            <input type="color" id="bg-color" value="#ffffff">
            <input type="text" id="bg-hex" value="#ffffff" maxlength="7">
          </div>
        </div>
      </div>

      <!-- Logo -->
      <div class="logo-group">
        <label class="section-label">Logo (optional)</label>
        <div class="logo-upload">
          <button class="logo-upload-btn" id="logo-btn">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><rect x="2" y="2" width="12" height="12" rx="2"/><circle cx="5.5" cy="5.5" r="1.5"/><path d="M14 10l-3.5-3.5L3 14"/></svg>
            Upload Logo
          </button>
          <img class="logo-preview" id="logo-preview" alt="Logo preview">
          <button class="logo-remove" id="logo-remove">Remove</button>
          <input type="file" id="logo-file" accept="image/*" style="display:none">
        </div>
      </div>

      <button class="btn-generate" id="btn-generate">
        Generate QR Code
        <kbd>Ctrl+Enter</kbd>
      </button>
    </section>

    <!-- Output -->
    <section class="card output-card" id="output-card">
      <div class="output-header">
        <h2 id="output-title">Output</h2>
        <div class="output-actions">
          <button class="btn-action" id="btn-png">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M8 2v9"/><path d="M4.5 7.5 8 11l3.5-3.5"/><path d="M2 13h12"/></svg>
            PNG
            <kbd>Ctrl+S</kbd>
          </button>
          <button class="btn-action" id="btn-svg">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M8 2v9"/><path d="M4.5 7.5 8 11l3.5-3.5"/><path d="M2 13h12"/></svg>
            SVG
          </button>
          <button class="btn-action" id="btn-copy-img">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M3 11V2.5A1.5 1.5 0 0 1 4.5 1H11"/></svg>
            Copy
            <kbd>Ctrl+C</kbd>
          </button>
          <button class="btn-action" id="btn-download-all" style="display:none">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M8 2v9"/><path d="M4.5 7.5 8 11l3.5-3.5"/><path d="M2 13h12"/></svg>
            Download All
          </button>
        </div>
      </div>
      <div class="qr-display" id="qr-display"></div>
      <div class="batch-grid" id="batch-grid" style="display:none"></div>
    </section>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <footer>
    Client-side QR generation &middot; No data sent to servers &middot;
    <a href="https://github.com/pedromussi1/QRCraft" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script>
    // ============================================================
    // QR Code Generator (based on qrcode-generator algorithm)
    // Supports QR Code Model 2, versions 1-40
    // ============================================================
    const QRCode = (() => {
      // Error correction levels
      const ECL = { L: 1, M: 0, Q: 3, H: 2 };

      // Number of error correction codewords per block
      const EC_CODEWORDS_PER_BLOCK = [
        [-1,7,10,15,20,26,18,20,24,30,18,20,24,26,30,22,24,28,30,28,28,28,28,30,30,26,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
        [-1,10,16,26,18,24,16,18,22,22,26,30,22,22,24,24,28,28,26,26,26,26,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28],
        [-1,13,22,18,26,18,24,18,22,20,24,28,26,24,20,30,24,28,28,26,30,28,30,30,30,30,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
        [-1,17,28,22,16,22,28,26,26,24,28,24,28,22,24,24,30,28,28,26,28,30,24,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
      ];

      // Number of error correction blocks
      const NUM_EC_BLOCKS = [
        [-1,1,1,1,1,1,2,2,2,2,4,4,4,4,4,6,6,6,6,7,8,8,9,9,10,12,12,12,13,14,15,16,17,18,19,19,20,21,22,24,25],
        [-1,1,1,1,2,2,4,4,4,5,5,5,8,9,9,10,10,11,13,14,16,17,17,18,20,21,23,25,26,28,29,31,33,35,37,38,40,43,45,47,49],
        [-1,1,1,2,2,4,4,6,6,8,8,8,10,12,16,12,17,16,18,21,20,23,23,25,27,29,34,34,35,38,40,43,45,48,51,53,56,59,62,65,68],
        [-1,1,1,2,4,4,4,5,6,8,8,11,11,16,16,18,16,19,21,25,25,25,34,30,32,35,37,40,42,45,48,51,54,57,60,63,66,70,74,77,81],
      ];

      const ALIGNMENT_PATTERN_POSITIONS = [
        [],[], [6,18], [6,22], [6,26], [6,30], [6,34], [6,22,38], [6,24,42], [6,26,46], [6,28,50],
        [6,30,54], [6,32,58], [6,34,62], [6,26,46,66], [6,26,48,70], [6,26,50,74], [6,30,54,78],
        [6,30,56,82], [6,30,58,86], [6,34,62,90], [6,28,50,72,94], [6,26,50,74,98], [6,30,54,78,102],
        [6,28,54,80,106], [6,32,58,84,110], [6,30,58,86,114], [6,34,62,90,118], [6,26,50,74,98,122],
        [6,30,54,78,102,126], [6,26,52,78,104,130], [6,30,56,82,108,134], [6,34,60,86,112,138],
        [6,30,58,86,114,142], [6,34,62,90,118,146], [6,30,54,78,102,126,150], [6,24,50,76,102,128,154],
        [6,28,54,80,106,132,158], [6,32,58,84,110,136,162], [6,26,54,82,110,138,166], [6,30,58,86,114,142,170],
      ];

      function getNumRawDataModules(ver) {
        let result = (16 * ver + 128) * ver + 64;
        if (ver >= 2) {
          const numAlign = Math.floor(ver / 7) + 2;
          result -= (25 * numAlign - 10) * numAlign - 55;
          if (ver >= 7) result -= 36;
        }
        return result;
      }

      function getNumDataCodewords(ver, ecl) {
        return Math.floor(getNumRawDataModules(ver) / 8) -
          EC_CODEWORDS_PER_BLOCK[ecl][ver] * NUM_EC_BLOCKS[ecl][ver];
      }

      // Reed-Solomon ECC
      function reedSolomonComputeDivisor(degree) {
        const result = new Uint8Array(degree);
        result[degree - 1] = 1;
        let root = 1;
        for (let i = 0; i < degree; i++) {
          for (let j = 0; j < result.length; j++) {
            result[j] = reedSolomonMultiply(result[j], root);
            if (j + 1 < result.length) result[j] ^= result[j + 1];
          }
          root = reedSolomonMultiply(root, 2);
        }
        return result;
      }

      function reedSolomonComputeRemainder(data, divisor) {
        const result = new Uint8Array(divisor.length);
        for (const b of data) {
          const factor = b ^ result[0];
          result.copyWithin(0, 1);
          result[result.length - 1] = 0;
          for (let i = 0; i < result.length; i++)
            result[i] ^= reedSolomonMultiply(divisor[i], factor);
        }
        return result;
      }

      function reedSolomonMultiply(x, y) {
        let z = 0;
        for (let i = 7; i >= 0; i--) {
          z = (z << 1) ^ ((z >>> 7) * 0x11D);
          z ^= ((y >>> i) & 1) * x;
        }
        return z;
      }

      // Bit buffer helper
      function createBitBuffer() {
        const data = [];
        let bitLen = 0;
        return {
          get length() { return bitLen; },
          get bytes() {
            const result = new Uint8Array(Math.ceil(bitLen / 8));
            for (let i = 0; i < bitLen; i++)
              if (data[i >>> 5] & (1 << (31 - (i & 31))))
                result[i >>> 3] |= 1 << (7 - (i & 7));
            return result;
          },
          push(val, len) {
            for (let i = len - 1; i >= 0; i--) {
              const idx = bitLen >>> 5;
              while (data.length <= idx) data.push(0);
              if ((val >>> i) & 1) data[idx] |= 1 << (31 - (bitLen & 31));
              bitLen++;
            }
          }
        };
      }

      function getMinVersion(dataLen, ecl) {
        for (let ver = 1; ver <= 40; ver++) {
          const capacity = getNumDataCodewords(ver, ecl) * 8;
          const headerBits = 4 + (ver < 10 ? 8 : 16);
          if (headerBits + dataLen * 8 <= capacity) return ver;
        }
        return -1;
      }

      // Main encode function
      function encode(text, eclName) {
        const ecl = ECL[eclName] !== undefined ? ECL[eclName] : ECL.M;
        const textBytes = new TextEncoder().encode(text);
        const ver = getMinVersion(textBytes.length, ecl);
        if (ver === -1) throw new Error('Text too long for QR code');

        const dataCapacity = getNumDataCodewords(ver, ecl);
        const buf = createBitBuffer();

        // Mode indicator (byte mode = 0100)
        buf.push(4, 4);
        // Character count
        buf.push(textBytes.length, ver < 10 ? 8 : 16);
        // Data
        for (const b of textBytes) buf.push(b, 8);
        // Terminator
        const capacityBits = dataCapacity * 8;
        buf.push(0, Math.min(4, capacityBits - buf.length));
        // Pad to byte boundary
        buf.push(0, (8 - buf.length % 8) % 8);
        // Pad bytes
        for (let pad = 0xEC; buf.length < capacityBits; pad ^= 0xEC ^ 0x11)
          buf.push(pad, 8);

        // Error correction
        const rawBytes = buf.bytes;
        const numBlocks = NUM_EC_BLOCKS[ecl][ver];
        const blockEcLen = EC_CODEWORDS_PER_BLOCK[ecl][ver];
        const shortBlockLen = Math.floor(dataCapacity / numBlocks);
        const numLongBlocks = dataCapacity % numBlocks;

        const divisor = reedSolomonComputeDivisor(blockEcLen);
        const blocks = [];
        const ecBlocks = [];
        let offset = 0;

        for (let i = 0; i < numBlocks; i++) {
          const blockLen = shortBlockLen + (i < numBlocks - numLongBlocks ? 0 : 1);
          const blockData = rawBytes.slice(offset, offset + blockLen);
          offset += blockLen;
          blocks.push(blockData);
          ecBlocks.push(reedSolomonComputeRemainder(blockData, divisor));
        }

        // Interleave
        const result = [];
        for (let i = 0; i < shortBlockLen + 1; i++)
          for (let j = 0; j < numBlocks; j++) {
            if (i < blocks[j].length) result.push(blocks[j][i]);
          }
        for (let i = 0; i < blockEcLen; i++)
          for (let j = 0; j < numBlocks; j++)
            result.push(ecBlocks[j][i]);

        // Build the QR matrix
        const size = ver * 4 + 17;
        const modules = Array.from({length: size}, () => new Uint8Array(size));
        const isFunction = Array.from({length: size}, () => new Uint8Array(size));

        // Draw function patterns
        drawFinderPattern(modules, isFunction, size, 3, 3);
        drawFinderPattern(modules, isFunction, size, size - 4, 3);
        drawFinderPattern(modules, isFunction, size, 3, size - 4);

        // Alignment patterns
        const alignPos = ALIGNMENT_PATTERN_POSITIONS[ver];
        for (let i = 0; i < alignPos.length; i++)
          for (let j = 0; j < alignPos.length; j++) {
            if ((i === 0 && j === 0) || (i === 0 && j === alignPos.length - 1) || (i === alignPos.length - 1 && j === 0))
              continue;
            drawAlignmentPattern(modules, isFunction, alignPos[i], alignPos[j]);
          }

        // Timing patterns
        for (let i = 0; i < size; i++) {
          setFunctionModule(modules, isFunction, 6, i, i % 2 === 0);
          setFunctionModule(modules, isFunction, i, 6, i % 2 === 0);
        }

        // Dark module
        setFunctionModule(modules, isFunction, 8, size - 8, true);

        // Reserve format/version areas
        for (let i = 0; i < 8; i++) {
          setFunctionModule(modules, isFunction, 8, i, false);
          setFunctionModule(modules, isFunction, i, 8, false);
          setFunctionModule(modules, isFunction, 8, size - 1 - i, false);
          setFunctionModule(modules, isFunction, size - 1 - i, 8, false);
        }
        setFunctionModule(modules, isFunction, 8, 8, false);

        if (ver >= 7) {
          for (let i = 0; i < 6; i++)
            for (let j = 0; j < 3; j++) {
              setFunctionModule(modules, isFunction, size - 11 + j, i, false);
              setFunctionModule(modules, isFunction, i, size - 11 + j, false);
            }
        }

        // Place data bits
        let bitIndex = 0;
        const dataBits = result;
        for (let right = size - 1; right >= 1; right -= 2) {
          if (right === 6) right = 5;
          for (let vert = 0; vert < size; vert++) {
            for (let j = 0; j < 2; j++) {
              const x = right - j;
              const upward = ((right + 1) & 2) === 0;
              const y = upward ? size - 1 - vert : vert;
              if (!isFunction[y][x] && bitIndex < dataBits.length * 8) {
                modules[y][x] = (dataBits[bitIndex >>> 3] >>> (7 - (bitIndex & 7))) & 1;
                bitIndex++;
              }
            }
          }
        }

        // Apply best mask
        let bestMask = 0;
        let bestPenalty = Infinity;
        for (let mask = 0; mask < 8; mask++) {
          const trial = modules.map(row => row.slice());
          applyMask(trial, isFunction, size, mask);
          drawFormatBits(trial, size, ecl, mask);
          if (ver >= 7) drawVersionBits(trial, size, ver);
          const penalty = computePenalty(trial, size);
          if (penalty < bestPenalty) {
            bestPenalty = penalty;
            bestMask = mask;
          }
        }

        applyMask(modules, isFunction, size, bestMask);
        drawFormatBits(modules, size, ecl, bestMask);
        if (ver >= 7) drawVersionBits(modules, size, ver);

        return { modules, size, version: ver };
      }

      function setFunctionModule(modules, isFunction, x, y, isDark) {
        modules[y][x] = isDark ? 1 : 0;
        isFunction[y][x] = 1;
      }

      function drawFinderPattern(modules, isFunction, size, cx, cy) {
        for (let dy = -4; dy <= 4; dy++)
          for (let dx = -4; dx <= 4; dx++) {
            const x = cx + dx, y = cy + dy;
            if (x < 0 || x >= size || y < 0 || y >= size) continue;
            const dist = Math.max(Math.abs(dx), Math.abs(dy));
            const isDark = dist !== 2 && dist !== 4;
            setFunctionModule(modules, isFunction, x, y, isDark);
          }
      }

      function drawAlignmentPattern(modules, isFunction, cx, cy) {
        for (let dy = -2; dy <= 2; dy++)
          for (let dx = -2; dx <= 2; dx++) {
            const isDark = Math.max(Math.abs(dx), Math.abs(dy)) !== 1;
            setFunctionModule(modules, isFunction, cx + dx, cy + dy, isDark);
          }
      }

      function drawFormatBits(modules, size, ecl, mask) {
        const data = ecl << 3 | mask;
        let rem = data;
        for (let i = 0; i < 10; i++) rem = (rem << 1) ^ ((rem >>> 9) * 0x537);
        const bits = (data << 10 | rem) ^ 0x5412;

        for (let i = 0; i <= 5; i++) modules[8][i] = (bits >>> i) & 1;
        modules[8][7] = (bits >>> 6) & 1;
        modules[8][8] = (bits >>> 7) & 1;
        modules[7][8] = (bits >>> 8) & 1;
        for (let i = 9; i < 15; i++) modules[14 - i][8] = (bits >>> i) & 1;

        for (let i = 0; i < 8; i++) modules[size - 1 - i][8] = (bits >>> i) & 1;
        for (let i = 8; i < 15; i++) modules[8][size - 15 + i] = (bits >>> i) & 1;
      }

      function drawVersionBits(modules, size, ver) {
        let rem = ver;
        for (let i = 0; i < 12; i++) rem = (rem << 1) ^ ((rem >>> 11) * 0x1F25);
        const bits = ver << 12 | rem;
        for (let i = 0; i < 18; i++) {
          const val = (bits >>> i) & 1;
          const a = size - 11 + i % 3, b = Math.floor(i / 3);
          modules[b][a] = val;
          modules[a][b] = val;
        }
      }

      function applyMask(modules, isFunction, size, mask) {
        for (let y = 0; y < size; y++)
          for (let x = 0; x < size; x++) {
            if (isFunction[y][x]) continue;
            let invert = false;
            switch (mask) {
              case 0: invert = (x + y) % 2 === 0; break;
              case 1: invert = y % 2 === 0; break;
              case 2: invert = x % 3 === 0; break;
              case 3: invert = (x + y) % 3 === 0; break;
              case 4: invert = (Math.floor(x / 3) + Math.floor(y / 2)) % 2 === 0; break;
              case 5: invert = x * y % 2 + x * y % 3 === 0; break;
              case 6: invert = (x * y % 2 + x * y % 3) % 2 === 0; break;
              case 7: invert = ((x + y) % 2 + x * y % 3) % 2 === 0; break;
            }
            if (invert) modules[y][x] ^= 1;
          }
      }

      function computePenalty(modules, size) {
        let penalty = 0;

        // Adjacent modules in row/column
        for (let y = 0; y < size; y++) {
          let runColor = false, runLen = 0;
          for (let x = 0; x < size; x++) {
            if (!!modules[y][x] === runColor) { runLen++; }
            else { runColor = !!modules[y][x]; runLen = 1; }
            if (runLen === 5) penalty += 3;
            else if (runLen > 5) penalty++;
          }
        }
        for (let x = 0; x < size; x++) {
          let runColor = false, runLen = 0;
          for (let y = 0; y < size; y++) {
            if (!!modules[y][x] === runColor) { runLen++; }
            else { runColor = !!modules[y][x]; runLen = 1; }
            if (runLen === 5) penalty += 3;
            else if (runLen > 5) penalty++;
          }
        }

        // 2x2 blocks
        for (let y = 0; y < size - 1; y++)
          for (let x = 0; x < size - 1; x++) {
            const c = modules[y][x];
            if (c === modules[y][x+1] && c === modules[y+1][x] && c === modules[y+1][x+1])
              penalty += 3;
          }

        // Finder-like patterns
        for (let y = 0; y < size; y++)
          for (let x = 0; x < size; x++) {
            if (x + 6 < size &&
              modules[y][x] && !modules[y][x+1] && modules[y][x+2] && modules[y][x+3] && modules[y][x+4] && !modules[y][x+5] && modules[y][x+6]) {
              if (x + 10 < size && !modules[y][x+7] && !modules[y][x+8] && !modules[y][x+9] && !modules[y][x+10]) penalty += 40;
              if (x >= 4 && !modules[y][x-1] && !modules[y][x-2] && !modules[y][x-3] && !modules[y][x-4]) penalty += 40;
            }
            if (y + 6 < size &&
              modules[y][x] && !modules[y+1][x] && modules[y+2][x] && modules[y+3][x] && modules[y+4][x] && !modules[y+5][x] && modules[y+6][x]) {
              if (y + 10 < size && !modules[y+7][x] && !modules[y+8][x] && !modules[y+9][x] && !modules[y+10][x]) penalty += 40;
              if (y >= 4 && !modules[y-1][x] && !modules[y-2][x] && !modules[y-3][x] && !modules[y-4][x]) penalty += 40;
            }
          }

        // Balance
        let dark = 0;
        for (let y = 0; y < size; y++)
          for (let x = 0; x < size; x++)
            if (modules[y][x]) dark++;
        const total = size * size;
        const k = Math.abs(Math.ceil(dark * 20 / total - 10));
        penalty += k * 10;

        return penalty;
      }

      return { encode };
    })();

    // ============================================================
    // App
    // ============================================================
    const els = {
      qrText: document.getElementById('qr-text'),
      charCount: document.getElementById('char-count'),
      batchText: document.getElementById('batch-text'),
      singleInput: document.getElementById('single-input'),
      batchInput: document.getElementById('batch-input'),
      errorCorrection: document.getElementById('error-correction'),
      qrSize: document.getElementById('qr-size'),
      fgColor: document.getElementById('fg-color'),
      fgHex: document.getElementById('fg-hex'),
      bgColor: document.getElementById('bg-color'),
      bgHex: document.getElementById('bg-hex'),
      logoBtn: document.getElementById('logo-btn'),
      logoFile: document.getElementById('logo-file'),
      logoPreview: document.getElementById('logo-preview'),
      logoRemove: document.getElementById('logo-remove'),
      btnGenerate: document.getElementById('btn-generate'),
      outputCard: document.getElementById('output-card'),
      outputTitle: document.getElementById('output-title'),
      qrDisplay: document.getElementById('qr-display'),
      batchGrid: document.getElementById('batch-grid'),
      btnPng: document.getElementById('btn-png'),
      btnSvg: document.getElementById('btn-svg'),
      btnCopyImg: document.getElementById('btn-copy-img'),
      btnDownloadAll: document.getElementById('btn-download-all'),
      toastContainer: document.getElementById('toast-container'),
      themeToggle: document.getElementById('theme-toggle'),
      themeIconMoon: document.getElementById('theme-icon-moon'),
      themeIconSun: document.getElementById('theme-icon-sun'),
    };

    let mode = 'single';
    let logoImage = null;
    let currentQR = null; // { modules, size, version }
    let currentCanvas = null;
    let batchCanvases = []; // [{canvas, label}]

    // --- Mode Tabs ---
    document.querySelectorAll('.mode-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        mode = tab.dataset.mode;
        els.singleInput.style.display = mode === 'single' ? '' : 'none';
        els.batchInput.classList.toggle('visible', mode === 'batch');
      });
    });

    // --- Character count ---
    els.qrText.addEventListener('input', () => {
      const len = new TextEncoder().encode(els.qrText.value).length;
      els.charCount.textContent = `${len.toLocaleString()} / 2,953`;
      els.charCount.classList.toggle('warn', len > 2953);
    });

    // --- Color sync ---
    function syncColor(colorInput, hexInput) {
      colorInput.addEventListener('input', () => {
        hexInput.value = colorInput.value;
      });
      hexInput.addEventListener('input', () => {
        if (/^#[0-9a-fA-F]{6}$/.test(hexInput.value)) {
          colorInput.value = hexInput.value;
        }
      });
      hexInput.addEventListener('blur', () => {
        hexInput.value = colorInput.value;
      });
    }
    syncColor(els.fgColor, els.fgHex);
    syncColor(els.bgColor, els.bgHex);

    // --- Logo ---
    els.logoBtn.addEventListener('click', () => els.logoFile.click());
    els.logoFile.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          logoImage = img;
          els.logoPreview.src = ev.target.result;
          els.logoPreview.classList.add('visible');
          els.logoRemove.classList.add('visible');
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    els.logoRemove.addEventListener('click', () => {
      logoImage = null;
      els.logoFile.value = '';
      els.logoPreview.classList.remove('visible');
      els.logoRemove.classList.remove('visible');
    });

    // --- Render QR to Canvas ---
    function renderQR(text, size, fgColor, bgColor, ecl, logo) {
      const qr = QRCode.encode(text, ecl);
      const moduleCount = qr.size;
      const quietZone = 4;
      const totalModules = moduleCount + quietZone * 2;
      const moduleSize = Math.max(1, Math.floor(size / totalModules));
      const canvasSize = moduleSize * totalModules;

      const canvas = document.createElement('canvas');
      canvas.width = canvasSize;
      canvas.height = canvasSize;
      const ctx = canvas.getContext('2d');

      // Background
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, canvasSize, canvasSize);

      // Modules
      ctx.fillStyle = fgColor;
      for (let y = 0; y < moduleCount; y++) {
        for (let x = 0; x < moduleCount; x++) {
          if (qr.modules[y][x]) {
            ctx.fillRect(
              (x + quietZone) * moduleSize,
              (y + quietZone) * moduleSize,
              moduleSize, moduleSize
            );
          }
        }
      }

      // Logo
      if (logo) {
        const logoSize = canvasSize * 0.22;
        const logoX = (canvasSize - logoSize) / 2;
        const logoY = (canvasSize - logoSize) / 2;
        const padding = logoSize * 0.1;

        // White background behind logo
        ctx.fillStyle = bgColor;
        ctx.beginPath();
        const rx = logoX - padding, ry = logoY - padding;
        const rw = logoSize + padding * 2, rh = logoSize + padding * 2;
        const r = 8;
        if (ctx.roundRect) {
          ctx.roundRect(rx, ry, rw, rh, r);
        } else {
          ctx.moveTo(rx + r, ry);
          ctx.arcTo(rx + rw, ry, rx + rw, ry + rh, r);
          ctx.arcTo(rx + rw, ry + rh, rx, ry + rh, r);
          ctx.arcTo(rx, ry + rh, rx, ry, r);
          ctx.arcTo(rx, ry, rx + rw, ry, r);
          ctx.closePath();
        }
        ctx.fill();

        ctx.drawImage(logo, logoX, logoY, logoSize, logoSize);
      }

      return { canvas, qr };
    }

    // --- Generate ---
    function generate() {
      const fgColor = els.fgColor.value;
      const bgColor = els.bgColor.value;
      const ecl = els.errorCorrection.value;
      const size = clamp(parseInt(els.qrSize.value) || 400, 100, 2000);
      els.qrSize.value = size;

      // Use high error correction if logo is present
      const effectiveEcl = logoImage ? 'H' : ecl;

      if (mode === 'single') {
        const text = els.qrText.value.trim();
        if (!text) {
          showToast('Please enter some content');
          els.qrText.focus();
          return;
        }

        try {
          const { canvas, qr } = renderQR(text, size, fgColor, bgColor, effectiveEcl, logoImage);
          currentQR = qr;
          currentCanvas = canvas;

          els.qrDisplay.innerHTML = '';
          els.qrDisplay.appendChild(canvas);
          els.qrDisplay.style.display = '';
          els.batchGrid.style.display = 'none';
          els.outputTitle.textContent = 'Output';
          els.outputCard.classList.add('visible');
          els.btnPng.style.display = '';
          els.btnSvg.style.display = '';
          els.btnCopyImg.style.display = '';
          els.btnDownloadAll.style.display = 'none';
        } catch (err) {
          showToast('Error: ' + err.message);
        }
      } else {
        // Batch mode
        const lines = els.batchText.value.split('\n').map(l => l.trim()).filter(l => l);
        if (lines.length === 0) {
          showToast('Please enter at least one line');
          els.batchText.focus();
          return;
        }
        if (lines.length > 50) {
          showToast('Maximum 50 codes at once');
          return;
        }

        els.batchGrid.innerHTML = '';
        batchCanvases = [];
        const batchSize = Math.min(size, 300);
        let errorCount = 0;

        lines.forEach((line, i) => {
          try {
            const { canvas } = renderQR(line, batchSize, fgColor, bgColor, effectiveEcl, null); // no logo in batch
            batchCanvases.push({ canvas, label: `qrcraft-${i + 1}.png` });
            const item = document.createElement('div');
            item.className = 'batch-item';
            item.style.animationDelay = `${i * 0.05}s`;
            item.appendChild(canvas);

            const label = document.createElement('div');
            label.className = 'batch-item-label';
            label.textContent = line.length > 30 ? line.slice(0, 30) + '...' : line;
            label.title = line;
            item.appendChild(label);

            // Download button per item
            const dlBtn = document.createElement('button');
            dlBtn.className = 'btn-copy';
            dlBtn.title = 'Download PNG';
            dlBtn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M8 2v9"/><path d="M4.5 7.5 8 11l3.5-3.5"/><path d="M2 13h12"/></svg>';
            dlBtn.addEventListener('click', () => downloadCanvas(canvas, `qrcraft-${i + 1}.png`));
            item.appendChild(dlBtn);

            els.batchGrid.appendChild(item);
          } catch {
            errorCount++;
          }
        });

        els.qrDisplay.style.display = 'none';
        els.batchGrid.style.display = '';
        els.outputTitle.textContent = `Batch Output (${lines.length - errorCount}/${lines.length})`;
        els.outputCard.classList.add('visible');
        els.btnPng.style.display = 'none';
        els.btnSvg.style.display = 'none';
        els.btnCopyImg.style.display = 'none';
        els.btnDownloadAll.style.display = '';
        currentCanvas = null;
        currentQR = null;

        if (errorCount > 0) showToast(`${errorCount} code(s) failed — content too long`);
      }
    }

    // --- Download ---
    function downloadCanvas(canvas, filename) {
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function downloadPNG() {
      if (!currentCanvas) return;
      downloadCanvas(currentCanvas, 'qrcraft.png');
      showToast('Downloaded qrcraft.png');
    }

    function downloadSVG() {
      if (!currentQR) return;
      const qr = currentQR;
      const moduleCount = qr.size;
      const quietZone = 4;
      const totalModules = moduleCount + quietZone * 2;
      const svgSize = parseInt(els.qrSize.value) || 400;
      const moduleSize = svgSize / totalModules;

      let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${svgSize} ${svgSize}" width="${svgSize}" height="${svgSize}">`;
      svg += `<rect width="${svgSize}" height="${svgSize}" fill="${els.bgColor.value}"/>`;

      for (let y = 0; y < moduleCount; y++) {
        for (let x = 0; x < moduleCount; x++) {
          if (qr.modules[y][x]) {
            svg += `<rect x="${(x + quietZone) * moduleSize}" y="${(y + quietZone) * moduleSize}" width="${moduleSize}" height="${moduleSize}" fill="${els.fgColor.value}"/>`;
          }
        }
      }
      svg += '</svg>';

      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'qrcraft.svg';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Downloaded qrcraft.svg');
    }

    async function downloadAllAsZip() {
      if (batchCanvases.length === 0) return;
      showToast('Preparing ZIP...');

      // Collect PNGs
      const files = [];
      for (const { canvas, label } of batchCanvases) {
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        const buf = await blob.arrayBuffer();
        files.push({ name: label, data: new Uint8Array(buf) });
      }

      // Build ZIP (store-only, no compression needed for PNGs)
      const zipParts = [];
      const centralDir = [];
      let offset = 0;

      for (const file of files) {
        const nameBytes = new TextEncoder().encode(file.name);
        const crc = crc32(file.data);

        // Local file header
        const localHeader = new Uint8Array(30 + nameBytes.length);
        const lv = new DataView(localHeader.buffer);
        lv.setUint32(0, 0x04034b50, true); // signature
        lv.setUint16(4, 20, true); // version needed
        lv.setUint16(6, 0, true); // flags
        lv.setUint16(8, 0, true); // compression (store)
        lv.setUint16(10, 0, true); // mod time
        lv.setUint16(12, 0, true); // mod date
        lv.setUint32(14, crc, true); // crc32
        lv.setUint32(18, file.data.length, true); // compressed size
        lv.setUint32(22, file.data.length, true); // uncompressed size
        lv.setUint16(26, nameBytes.length, true); // filename length
        lv.setUint16(28, 0, true); // extra length
        localHeader.set(nameBytes, 30);

        // Central directory entry
        const cdEntry = new Uint8Array(46 + nameBytes.length);
        const cv = new DataView(cdEntry.buffer);
        cv.setUint32(0, 0x02014b50, true); // signature
        cv.setUint16(4, 20, true); // version made by
        cv.setUint16(6, 20, true); // version needed
        cv.setUint16(8, 0, true); // flags
        cv.setUint16(10, 0, true); // compression
        cv.setUint16(12, 0, true); // mod time
        cv.setUint16(14, 0, true); // mod date
        cv.setUint32(16, crc, true); // crc32
        cv.setUint32(20, file.data.length, true); // compressed size
        cv.setUint32(24, file.data.length, true); // uncompressed size
        cv.setUint16(28, nameBytes.length, true); // filename length
        cv.setUint16(30, 0, true); // extra length
        cv.setUint16(32, 0, true); // comment length
        cv.setUint16(34, 0, true); // disk start
        cv.setUint16(36, 0, true); // internal attr
        cv.setUint32(38, 0, true); // external attr
        cv.setUint32(42, offset, true); // local header offset
        cdEntry.set(nameBytes, 46);
        centralDir.push(cdEntry);

        zipParts.push(localHeader, file.data);
        offset += localHeader.length + file.data.length;
      }

      // End of central directory
      const cdOffset = offset;
      let cdSize = 0;
      for (const cd of centralDir) { zipParts.push(cd); cdSize += cd.length; }

      const eocd = new Uint8Array(22);
      const ev = new DataView(eocd.buffer);
      ev.setUint32(0, 0x06054b50, true); // signature
      ev.setUint16(4, 0, true); // disk number
      ev.setUint16(6, 0, true); // cd disk number
      ev.setUint16(8, files.length, true); // entries on disk
      ev.setUint16(10, files.length, true); // total entries
      ev.setUint32(12, cdSize, true); // cd size
      ev.setUint32(16, cdOffset, true); // cd offset
      ev.setUint16(20, 0, true); // comment length
      zipParts.push(eocd);

      const blob = new Blob(zipParts, { type: 'application/zip' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'qrcraft-batch.zip';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast(`Downloaded ${files.length} QR codes as ZIP`);
    }

    // CRC32 for ZIP
    function crc32(data) {
      let crc = 0xFFFFFFFF;
      for (let i = 0; i < data.length; i++) {
        crc ^= data[i];
        for (let j = 0; j < 8; j++) crc = (crc >>> 1) ^ (crc & 1 ? 0xEDB88320 : 0);
      }
      return (crc ^ 0xFFFFFFFF) >>> 0;
    }

    async function copyImage() {
      if (!currentCanvas) return;
      try {
        const blob = await new Promise(resolve => currentCanvas.toBlob(resolve, 'image/png'));
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        showToast('Copied QR code to clipboard');
      } catch {
        showToast('Copy failed — try downloading instead');
      }
    }

    // --- Toast ---
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      els.toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 2200);
    }

    // --- Helpers ---
    function clamp(val, min, max) {
      return Math.min(Math.max(val, min), max);
    }

    // --- Event Listeners ---
    els.btnGenerate.addEventListener('click', generate);
    els.btnPng.addEventListener('click', downloadPNG);
    els.btnSvg.addEventListener('click', downloadSVG);
    els.btnCopyImg.addEventListener('click', copyImage);
    els.btnDownloadAll.addEventListener('click', downloadAllAsZip);

    // Enter in textarea
    els.qrText.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        generate();
      }
    });

    els.batchText.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        generate();
      }
    });

    // Global shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        generate();
      }
      if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        downloadPNG();
      }
      if (e.ctrlKey && !e.shiftKey && e.key === 'c' && !window.getSelection().toString()
          && document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'INPUT') {
        if (currentCanvas) {
          e.preventDefault();
          copyImage();
        }
      }
      if (e.key === 't' && !e.ctrlKey && !e.altKey && document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'INPUT') {
        toggleTheme();
      }
    });

    // --- Theme ---
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('qrcraft-theme', theme);
      els.themeIconMoon.style.display = theme === 'light' ? 'none' : '';
      els.themeIconSun.style.display = theme === 'light' ? '' : 'none';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      setTheme(current === 'dark' ? 'light' : 'dark');
    }

    els.themeToggle.addEventListener('click', toggleTheme);

    // Load theme
    setTheme(localStorage.getItem('qrcraft-theme') || 'dark');
  </script>
</body>
</html>
